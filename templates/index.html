<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Ollama Interface</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Geist:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    >
    <style>
      body {
        background-color: #101415;
        color: #e0e3e5;
        -webkit-font-smoothing: antialiased;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #323537;
        border-radius: 10px;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#d2bbff",
              background: "#101415",
              surface: "#101415",
              "surface-container-lowest": "#0b0f10",
              "surface-container-low": "#191c1e",
              "surface-container": "#1d2022",
              "surface-container-high": "#272a2c",
              "surface-container-highest": "#323537",
              "on-surface": "#e0e3e5",
              "on-surface-variant": "#ccc3d8",
              outline: "#958da1",
              "outline-variant": "#4a4455",
              "primary-container": "#7c3aed",
              "primary-fixed": "#eaddff",
              "secondary-fixed": "#d8e3fb",
              tertiary: "#b9c7e0",
            },
            fontFamily: {
              display: ["Geist"],
              body: ["Inter"],
              code: ["JetBrains Mono"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background text-on-surface overflow-hidden font-body">
    <aside class="w-[280px] h-screen fixed left-0 top-0 bg-surface-container-low border-r border-outline-variant flex flex-col py-4 z-50 max-md:hidden">
      <div class="px-6 mb-8">
        <h1 class="font-display text-2xl font-bold text-on-surface">Ollama Interface</h1>
      </div>
      <div class="px-4 mb-6">
        <button
          id="new-chat-button"
          class="w-full flex items-center gap-3 px-4 py-3 bg-[#7c3aed] text-white rounded-lg font-medium active:scale-95 transition-all duration-200 hover:brightness-110"
          type="button"
        >
          <span class="material-symbols-outlined">add_box</span>
          New Chat
        </button>
      </div>
      <nav class="flex-1 px-2 space-y-1 overflow-y-auto custom-scrollbar">
        <a class="flex items-center gap-3 px-4 py-2.5 bg-[#1d2022] text-white border-l-2 border-[#7c3aed] rounded-r-lg" href="#">
          <span class="material-symbols-outlined text-[20px]">chat_bubble</span>
          <span class="truncate">Current Session</span>
        </a>
        <div class="px-4 pt-4 text-[11px] uppercase tracking-[0.2em] text-on-surface-variant/50">
          Local Ollama chat with optional web search
        </div>
      </nav>
    </aside>

    <header class="fixed top-0 right-0 w-[calc(100%-280px)] max-md:w-full z-40 bg-[#101415]/90 backdrop-blur-xl border-b border-white/5">
      <div class="flex justify-between items-center h-16 px-6 max-w-[800px] mx-auto w-full">
        <div class="flex items-center gap-2 min-w-0">
          <span class="material-symbols-outlined text-[#7c3aed]">bolt</span>
          <span id="active-model-name" class="font-display text-xl font-semibold text-on-surface truncate">No model</span>
          <span id="active-model-badge" class="px-2 py-0.5 rounded bg-surface-container-high text-[10px] font-mono text-outline hidden"></span>
        </div>
        <div class="flex items-center gap-3">
          <select
            id="model-select"
            class="bg-surface-container border border-white/10 rounded-lg px-3 py-2 text-sm text-on-surface focus:border-[#7c3aed] focus:ring-0 max-w-[220px]"
          ></select>
        </div>
      </div>
    </header>

    <main class="ml-[280px] max-md:ml-0 pt-16 h-screen flex flex-col relative">
      <div id="chat-scroll" class="flex-1 overflow-y-auto custom-scrollbar px-6">
        <div class="max-w-[800px] mx-auto py-8">
          <div id="status-banner" class="hidden mb-6 rounded-lg border px-4 py-3 text-sm"></div>
          <section id="chat-log" class="space-y-10"></section>
          <div class="h-32"></div>
        </div>
      </div>

      <div class="w-full pb-8 pt-4 bg-gradient-to-t from-background via-background/95 to-transparent">
        <div class="max-w-[800px] mx-auto px-6">
          <div class="bg-[#1d2022] border border-white/10 rounded-lg p-2 flex flex-col gap-2 shadow-xl transition-all duration-300">
            <textarea
              id="message-input"
              class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/40 resize-none px-4 pt-4 min-h-[60px] max-h-[200px]"
              placeholder="Message your Ollama model..."
            ></textarea>
            <div class="flex items-center justify-between px-2 pb-2 gap-3 max-md:flex-col max-md:items-stretch">
              <div class="flex items-center gap-2 flex-wrap">
                <button
                  id="web-search-button"
                  class="group flex items-center gap-2 px-3 py-1.5 rounded-lg border border-white/10 hover:border-[#7c3aed]/50 transition-all active:scale-95"
                  type="button"
                  aria-pressed="false"
                >
                  <span class="material-symbols-outlined text-[18px] text-on-surface-variant group-hover:text-primary">public</span>
                  <span class="text-[12px] font-mono text-on-surface-variant group-hover:text-on-surface">Web Search</span>
                </button>
                <button
                  id="thinking-button"
                  class="group flex items-center gap-2 px-3 py-1.5 rounded-lg border border-white/10 hover:border-[#7c3aed]/50 transition-all active:scale-95"
                  type="button"
                  aria-pressed="false"
                >
                  <span class="material-symbols-outlined text-[18px] text-on-surface-variant group-hover:text-primary">psychology</span>
                  <span class="text-[12px] font-mono text-on-surface-variant group-hover:text-on-surface">Thinking</span>
                </button>
              </div>
              <div class="flex items-center gap-2 self-end max-md:self-stretch max-md:justify-end">
                <button
                  id="send-button"
                  class="w-10 h-10 rounded-lg bg-[#7c3aed] flex items-center justify-center text-white shadow-lg shadow-[#7c3aed]/20 hover:bg-[#6d28d9] transition-all duration-200 active:scale-90 disabled:opacity-60"
                  type="button"
                >
                  <span class="material-symbols-outlined">arrow_upward</span>
                </button>
              </div>
            </div>
          </div>
          <div class="mt-4 flex justify-center">
            <p class="text-[11px] text-on-surface-variant/40 font-mono uppercase tracking-[0.2em]">
              LLM can make mistakes. Verify critical info.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
